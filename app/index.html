<!doctype html>
<html lang="pt-BR" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="canonical" href="https://yayababy.app/" />
    <link rel="icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0d0a27" />
    <meta name="description" content="Registre amamentacao, fraldas, sono e banho do seu bebe em segundos. Lembretes inteligentes e compartilhamento familiar. Gratuito." />
    <meta name="apple-mobile-web-app-title" content="Yaya" />
    <meta property="og:title" content="Yaya — A rotina do seu bebê, com 1 toque." />
    <meta property="og:site_name" content="Yaya" />
    <meta property="og:description" content="Registre amamentação, fraldas, sono e banho do seu bebê em segundos. Lembretes inteligentes e compartilhamento familiar." />
    <title>Yaya — A rotina do seu bebê, com 1 toque.</title>
    <link rel="manifest" href="/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <!-- Material Symbols: self-hosted in src/fonts/ via globals.css -->
    <!-- Aplica tema antes do React montar pra evitar flash de tema errado -->
    <script>
      (function(){
        try {
          var t = localStorage.getItem('yaya_theme');
          if (t === 'light') {
            document.documentElement.classList.add('theme-light');
            var meta = document.querySelector('meta[name="theme-color"]');
            if (meta) meta.setAttribute('content', '#ffffff');
          }
        } catch (e) { /* localStorage indisponível */ }
      })();
    </script>
  </head>
  <body class="bg-surface text-on-background font-body antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <noscript>
      <div style="text-align:center;padding:40px;font-family:sans-serif;">
        Este app precisa de JavaScript. <a href="/privacy" style="color:#888;font-size:11px;">Política de Privacidade</a>
      </div>
    </noscript>
  </body>
</html>
