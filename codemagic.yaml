workflows:
  ios-testflight:
    name: iOS TestFlight
    max_build_duration: 30
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: codemagic
    environment:
      groups:
        - yaya_ios
      node: 22
      xcode: latest
    scripts:
      - name: Install dependencies
        script: |
          cd app
          npm ci

      - name: Build web assets
        script: |
          cd app
          CAPACITOR_BUILD=1 npm run build

      - name: Sync Capacitor iOS (copy web assets only)
        script: |
          cd app
          # A pasta app/ios/ é versionada — pbxproj, Info.plist, entitlements
          # e signing ficam travados no repo. `cap sync` só copia dist/ pra
          # dentro do ios/App/public. Nada de regenerar projeto.
          npx cap sync ios

      - name: Install distribution certificate and profile
        script: |
          # Setup keychain
          keychain initialize

          # Import .p12
          echo "$CM_CERTIFICATE" | base64 --decode > /tmp/distribution.p12
          CM_KEYCHAIN=$(security list-keychains | grep codemagic | tr -d ' "' | head -1)
          [ -z "$CM_KEYCHAIN" ] && CM_KEYCHAIN="$HOME/Library/Keychains/codemagic.keychain-db"
          echo "=== Using keychain: $CM_KEYCHAIN ==="

          security import /tmp/distribution.p12 \
            -k "$CM_KEYCHAIN" \
            -P "$CM_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -k "" "$CM_KEYCHAIN"

          echo "=== Certificate installed ==="
          security find-identity -v -p codesigning

          # Install provisioning profile
          echo "$CM_PROVISIONING_PROFILE" | base64 --decode > /tmp/yaya.mobileprovision
          PROFILE_UUID=$(security cms -D -i /tmp/yaya.mobileprovision 2>/dev/null | grep -A1 UUID | grep string | sed 's/.*<string>//;s/<\/string>.*//')
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp /tmp/yaya.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/${PROFILE_UUID}.mobileprovision
          echo "=== Profile installed: UUID=$PROFILE_UUID ==="

      - name: Set app icon
        script: |
          cp app/assets/app-icon-1024.png app/ios/App/App/Assets.xcassets/AppIcon.appiconset/AppIcon-512@2x.png

      - name: Set version and build number
        script: |
          # Sobrescreve MARKETING_VERSION e CURRENT_PROJECT_VERSION diretamente
          # no pbxproj (versionado). Único local a manter versão sincronizada.
          PBXPROJ="app/ios/App/App.xcodeproj/project.pbxproj"
          sed -i '' 's/MARKETING_VERSION = [^;]*;/MARKETING_VERSION = 1.7.3;/g' "$PBXPROJ"
          sed -i '' 's/CURRENT_PROJECT_VERSION = [^;]*;/CURRENT_PROJECT_VERSION = 38;/g' "$PBXPROJ"
          echo "=== Versions set ==="
          grep -n "MARKETING_VERSION\|CURRENT_PROJECT_VERSION" "$PBXPROJ"

      - name: Build iOS
        script: |
          cd app/ios/App

          # ExportOptions.plist
          printf '<?xml version="1.0" encoding="UTF-8"?>\n<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">\n<plist version="1.0">\n<dict>\n\t<key>method</key>\n\t<string>app-store</string>\n\t<key>teamID</key>\n\t<string>8TC26XK3WP</string>\n\t<key>signingStyle</key>\n\t<string>manual</string>\n\t<key>provisioningProfiles</key>\n\t<dict>\n\t\t<key>app.yayababy</key>\n\t\t<string>Yaya Codemagic Distribution</string>\n\t</dict>\n\t<key>signingCertificate</key>\n\t<string>Apple Distribution</string>\n</dict>\n</plist>\n' > /tmp/ExportOptions.plist
          plutil -lint /tmp/ExportOptions.plist

          # Archive — signing já está configurado permanentemente no pbxproj
          # versionado (CODE_SIGN_STYLE=Manual, CODE_SIGN_IDENTITY="Apple Distribution",
          # DEVELOPMENT_TEAM, PROVISIONING_PROFILE_SPECIFIER, CODE_SIGN_ENTITLEMENTS).
          xcodebuild archive \
            -project "App.xcodeproj" \
            -scheme "App" \
            -destination "generic/platform=iOS" \
            -archivePath "$CM_BUILD_DIR/App.xcarchive" \
            COMPILER_INDEX_STORE_ENABLE=NO

          # Export IPA
          xcodebuild -exportArchive \
            -archivePath "$CM_BUILD_DIR/App.xcarchive" \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -exportPath "$CM_BUILD_DIR/ipa"
    artifacts:
      - $CM_BUILD_DIR/ipa/*.ipa
      - $CM_BUILD_DIR/*.xcarchive
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
