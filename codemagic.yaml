workflows:
  ios-testflight:
    name: iOS TestFlight
    max_build_duration: 30
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: codemagic
    environment:
      node: 22
      xcode: latest
      ios_signing:
        distribution_type: app_store
        bundle_identifier: app.yayababy
    scripts:
      - name: Install dependencies
        script: |
          cd app
          npm ci
      - name: Build web assets
        script: |
          cd app
          npm run build
      - name: Add and Sync Capacitor iOS
        script: |
          cd app
          npx cap add ios || true
          npx cap sync ios
      - name: Set up code signing
        script: |
          xcode-project use-profiles
      - name: Set app icon
        script: |
          cp app/assets/app-icon-1024.png app/ios/App/App/Assets.xcassets/AppIcon.appiconset/AppIcon-512@2x.png
      - name: Configure iOS plist
        script: |
          cd app/ios/App/App
          /usr/libexec/PlistBuddy -c "Add :ITSAppUsesNonExemptEncryption bool false" Info.plist || /usr/libexec/PlistBuddy -c "Set :ITSAppUsesNonExemptEncryption false" Info.plist
          /usr/libexec/PlistBuddy -c "Add :GADApplicationIdentifier string ca-app-pub-5445931232409285~9773184902" Info.plist || /usr/libexec/PlistBuddy -c "Set :GADApplicationIdentifier ca-app-pub-5445931232409285~9773184902" Info.plist
      - name: Set version and build number
        script: |
          cd app/ios/App
          agvtool new-marketing-version 1.6.1
          agvtool new-version -all 27
      - name: Build iOS
        script: |
          cd app/ios/App
          xcode-project build-ipa \
            --project "App.xcodeproj" \
            --scheme "App" \
            --archive-flags="-destination 'generic/platform=iOS'"
    artifacts:
      - app/ios/App/build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: false
