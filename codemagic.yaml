workflows:
  ios-testflight:
    name: iOS TestFlight
    max_build_duration: 30
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: codemagic
    environment:
      groups:
        - yaya_ios
      node: 22
      xcode: latest
      ios_signing:
        distribution_type: app_store
        bundle_identifier: app.yayababy
    scripts:
      - name: Install dependencies
        script: |
          cd app
          npm ci
      - name: Build web assets
        script: |
          cd app
          CAPACITOR_BUILD=1 npm run build
      - name: Add and Sync Capacitor iOS
        script: |
          cd app
          npx cap add ios || true
          npx cap sync ios
      - name: Configure entitlements
        script: |
          # Cria entitlements file com Sign In with Apple
          cat > app/ios/App/App/App.entitlements <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>com.apple.developer.applesignin</key>
            <array>
              <string>Default</string>
            </array>
          </dict>
          </plist>
          EOF

          # Injeta CODE_SIGN_ENTITLEMENTS no pbxproj (antes do use-profiles)
          python3 <<'PYEOF'
          with open('app/ios/App/App.xcodeproj/project.pbxproj', 'r') as f:
              content = f.read()
          if 'CODE_SIGN_ENTITLEMENTS' not in content:
              content = content.replace(
                  'CODE_SIGN_STYLE = Automatic;',
                  'CODE_SIGN_STYLE = Automatic;\n\t\t\t\tCODE_SIGN_ENTITLEMENTS = App/App.entitlements;'
              )
              with open('app/ios/App/App.xcodeproj/project.pbxproj', 'w') as f:
                  f.write(content)
              print('Added CODE_SIGN_ENTITLEMENTS to pbxproj')
          else:
              print('CODE_SIGN_ENTITLEMENTS already present')
          PYEOF
          plutil -lint app/ios/App/App.xcodeproj/project.pbxproj
      - name: Install certificate via Codemagic
        script: |
          # use-profiles instala o certificado de distribuição + cria um
          # provisioning profile. O profile pode não ter SIWA, mas não importa
          # — vamos trocar pra automatic signing no próximo step.
          xcode-project use-profiles
      - name: Switch to automatic signing + prepare API key
        script: |
          # ============================================================
          # O use-profiles setou Manual signing + um profile sem SIWA.
          # Trocamos pra Automatic e deixamos o Xcode criar o profile
          # correto via API key do App Store Connect.
          # ============================================================

          # 1. Debug: mostra entitlements do profile instalado
          echo "=== Profile entitlements ==="
          for f in "$HOME/Library/MobileDevice/Provisioning Profiles"/*.mobileprovision; do
            echo "--- $(basename "$f") ---"
            security cms -D -i "$f" 2>/dev/null | plutil -extract Entitlements xml1 -o - - 2>/dev/null || \
              security cms -D -i "$f" 2>/dev/null | grep -A2 "apple" || echo "(could not extract)"
          done

          # 2. Switch pbxproj: Manual → Automatic, remove profile specifier, set team
          python3 <<'PYEOF'
          import re

          with open('app/ios/App/App.xcodeproj/project.pbxproj', 'r') as f:
              content = f.read()

          # use-profiles set Manual — switch back to Automatic
          content = content.replace('CODE_SIGN_STYLE = Manual;', 'CODE_SIGN_STYLE = Automatic;')
          print(f'Manual→Automatic replacements: {content.count("CODE_SIGN_STYLE = Automatic;")}')

          # Remove PROVISIONING_PROFILE_SPECIFIER (conflicts with Automatic)
          content = re.sub(r'\t*PROVISIONING_PROFILE_SPECIFIER = ".*?";\n', '', content)
          print('Removed PROVISIONING_PROFILE_SPECIFIER')

          # Replace any CODE_SIGN_IDENTITY with generic "Apple Distribution"
          # WITHOUT this, Xcode defaults to Development signing which requires
          # registered devices (we have none). "Apple Distribution" tells Xcode
          # to use the distribution cert for App Store builds.
          content = re.sub(
              r'("?CODE_SIGN_IDENTITY(\[sdk=iphoneos\*\])?"?) = ".*?"',
              r'\1 = "Apple Distribution"',
              content
          )
          identity_count = content.count('CODE_SIGN_IDENTITY')
          print(f'CODE_SIGN_IDENTITY set to Apple Distribution (count: {content.count("Apple Distribution")})')

          # Safety net: if use-profiles didn't inject CODE_SIGN_IDENTITY at all,
          # we must add it ourselves — otherwise Xcode defaults to Development signing
          if identity_count == 0:
              content = content.replace(
                  'CODE_SIGN_STYLE = Automatic;',
                  'CODE_SIGN_STYLE = Automatic;\n\t\t\t\tCODE_SIGN_IDENTITY = "Apple Distribution";'
              )
              print('SAFETY NET: Injected CODE_SIGN_IDENTITY (was missing entirely)')

          # Ensure DEVELOPMENT_TEAM
          if 'DEVELOPMENT_TEAM = 8TC26XK3WP' not in content:
              content = content.replace(
                  'CODE_SIGN_STYLE = Automatic;',
                  'CODE_SIGN_STYLE = Automatic;\n\t\t\t\tDEVELOPMENT_TEAM = 8TC26XK3WP;'
              )
              print('Added DEVELOPMENT_TEAM')

          with open('app/ios/App/App.xcodeproj/project.pbxproj', 'w') as f:
              f.write(content)
          print('pbxproj updated for automatic signing')
          PYEOF

          plutil -lint app/ios/App/App.xcodeproj/project.pbxproj

          # 3. Resolve API key — Codemagic stores it as @file:path reference
          python3 <<'PYEOF'
          import os, sys, shutil

          key_id = os.environ.get('APP_STORE_CONNECT_KEY_IDENTIFIER', '')
          raw_key = os.environ.get('APP_STORE_CONNECT_PRIVATE_KEY', '')

          print(f'Key ID: {key_id}')
          print(f'Raw value (first 40 chars): {raw_key[:40]}')

          # Codemagic stores the key as "@file:/path/to/key.p8"
          # The REAL key is already on disk — DON'T overwrite it!
          if raw_key.startswith('@file:'):
              src_path = raw_key[6:]  # strip @file: prefix
              print(f'Codemagic file reference detected: {src_path}')
              if os.path.exists(src_path):
                  with open(src_path, 'r') as f:
                      content = f.read()
                  lines = content.strip().split('\n')
                  print(f'File exists: {len(content)} bytes, {len(lines)} lines')
                  print(f'First: {lines[0]}')
                  print(f'Last:  {lines[-1]}')
                  # Copy to standard xcodebuild search locations (if not already there)
                  for d in ['~/.appstoreconnect/private_keys', '~/private_keys']:
                      dest_dir = os.path.expanduser(d)
                      os.makedirs(dest_dir, exist_ok=True)
                      dest = os.path.join(dest_dir, f'AuthKey_{key_id}.p8')
                      if os.path.abspath(dest) != os.path.abspath(src_path):
                          shutil.copy2(src_path, dest)
                          print(f'Copied to: {dest}')
                  print('API key ready')
              else:
                  print(f'ERROR: Referenced file does not exist: {src_path}')
                  sys.exit(1)
          else:
              # Raw PEM content — write it
              key = raw_key.replace('\\n', '\n').replace('\r', '')
              if not key.endswith('\n'):
                  key += '\n'
              for d in ['~/.appstoreconnect/private_keys', '~/private_keys']:
                  dest_dir = os.path.expanduser(d)
                  os.makedirs(dest_dir, exist_ok=True)
                  dest = os.path.join(dest_dir, f'AuthKey_{key_id}.p8')
                  with open(dest, 'w') as f:
                      f.write(key)
                  print(f'Written to: {dest}')
              lines = key.strip().split('\n')
              print(f'Lines: {len(lines)}, First: {lines[0]}')
          PYEOF

          echo ""
          echo "=== signing config summary ==="
          grep -c "CODE_SIGN_STYLE = Automatic" app/ios/App/App.xcodeproj/project.pbxproj | xargs -I{} echo "Automatic signing count: {}"
          grep -c "DEVELOPMENT_TEAM = 8TC26XK3WP" app/ios/App/App.xcodeproj/project.pbxproj | xargs -I{} echo "Team ID count: {}"
          grep -c "CODE_SIGN_ENTITLEMENTS" app/ios/App/App.xcodeproj/project.pbxproj | xargs -I{} echo "Entitlements count: {}"
      - name: Set app icon
        script: |
          cp app/assets/app-icon-1024.png app/ios/App/App/Assets.xcassets/AppIcon.appiconset/AppIcon-512@2x.png
      - name: Configure iOS plist
        script: |
          cd app/ios/App/App
          # Encryption (App Store export compliance)
          /usr/libexec/PlistBuddy -c "Add :ITSAppUsesNonExemptEncryption bool false" Info.plist || /usr/libexec/PlistBuddy -c "Set :ITSAppUsesNonExemptEncryption false" Info.plist
          # AdMob
          /usr/libexec/PlistBuddy -c "Add :GADApplicationIdentifier string ca-app-pub-5445931232409285~9773184902" Info.plist || /usr/libexec/PlistBuddy -c "Set :GADApplicationIdentifier ca-app-pub-5445931232409285~9773184902" Info.plist
          # Photo library + camera usage descriptions
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryUsageDescription string 'O Yaya precisa acessar suas fotos para você escolher a imagem do perfil do bebê.'" Info.plist || /usr/libexec/PlistBuddy -c "Set :NSPhotoLibraryUsageDescription 'O Yaya precisa acessar suas fotos para você escolher a imagem do perfil do bebê.'" Info.plist
          /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string 'O Yaya precisa acessar a câmera para você tirar uma foto do bebê para o perfil.'" Info.plist || /usr/libexec/PlistBuddy -c "Set :NSCameraUsageDescription 'O Yaya precisa acessar a câmera para você tirar uma foto do bebê para o perfil.'" Info.plist
          # URL scheme
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes array" Info.plist 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0 dict" Info.plist 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0:CFBundleURLName string app.yayababy" Info.plist 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0:CFBundleURLSchemes array" Info.plist 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0:CFBundleURLSchemes:0 string app.yayababy" Info.plist 2>/dev/null || true
      - name: Set version and build number
        script: |
          PLIST="app/ios/App/App/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString 1.7.0" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion 34" "$PLIST"
      - name: Build iOS
        script: |
          cd app/ios/App

          # Encontra a API key (escrita pelo step anterior ou já existente)
          KEY_PATH=""
          for dir in ~/.appstoreconnect/private_keys ~/private_keys ~/.private_keys; do
            found=$(find "$dir" -name "AuthKey_*.p8" 2>/dev/null | head -1)
            if [ -n "$found" ]; then
              KEY_PATH="$found"
              break
            fi
          done

          # Fallback: busca em qualquer lugar do home
          if [ -z "$KEY_PATH" ]; then
            KEY_PATH=$(find "$HOME" -name "AuthKey_*.p8" -type f 2>/dev/null | head -1)
          fi

          if [ -z "$KEY_PATH" ]; then
            echo "ERROR: No API key (.p8) file found!"
            find "$HOME" -name "*.p8" -type f 2>/dev/null || echo "No .p8 files anywhere"
            exit 1
          fi

          echo "=== Using API key: $KEY_PATH ==="
          echo "Key ID: $APP_STORE_CONNECT_KEY_IDENTIFIER"
          echo "Issuer: ${APP_STORE_CONNECT_ISSUER_ID:0:8}..."
          wc -l "$KEY_PATH"
          head -1 "$KEY_PATH"
          tail -1 "$KEY_PATH"

          echo ""
          echo "=== xcodebuild archive ==="
          mkdir -p build/ios/xcarchive build/ios/ipa
          set +e
          xcodebuild \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/ios/xcarchive/App.xcarchive \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$KEY_PATH" \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            archive 2>&1 | tee /tmp/archive.log
          ARCHIVE_EXIT=${PIPESTATUS[0]}
          set -e

          if [ $ARCHIVE_EXIT -ne 0 ]; then
            echo ""
            echo "=================================================="
            echo "ARCHIVE FAILED (exit $ARCHIVE_EXIT)"
            echo "=== last 200 lines of xcodebuild output ==="
            echo "=================================================="
            tail -200 /tmp/archive.log
            exit $ARCHIVE_EXIT
          fi

          echo ""
          echo "=== archive OK, exporting IPA ==="
          cat > /tmp/ExportOptions.plist <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID</key>
              <string>8TC26XK3WP</string>
              <key>signingStyle</key>
              <string>automatic</string>
              <key>uploadSymbols</key>
              <true/>
              <key>stripSwiftSymbols</key>
              <true/>
          </dict>
          </plist>
          EOF

          set +e
          xcodebuild \
            -exportArchive \
            -archivePath build/ios/xcarchive/App.xcarchive \
            -exportPath build/ios/ipa \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$KEY_PATH" \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID" \
            2>&1 | tee /tmp/export.log
          EXPORT_EXIT=${PIPESTATUS[0]}
          set -e

          if [ $EXPORT_EXIT -ne 0 ]; then
            echo ""
            echo "=== EXPORT FAILED (exit $EXPORT_EXIT), last 100 lines ==="
            tail -100 /tmp/export.log
            exit $EXPORT_EXIT
          fi

          echo ""
          echo "=== done ==="
          ls -la build/ios/ipa/
    artifacts:
      - app/ios/App/build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
