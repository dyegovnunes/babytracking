workflows:
  ios-testflight:
    name: iOS TestFlight
    max_build_duration: 30
    instance_type: mac_mini_m2
    # Automatic code signing gerenciado pelo Codemagic via ASC API.
    # A integration "codemagic" (Teams → Integrations → App Store Connect)
    # deve ter uma API key válida com permissões de signing.
    integrations:
      app_store_connect: codemagic
    environment:
      groups:
        - yaya_ios
      node: 22
      xcode: latest
    scripts:
      - name: Install dependencies
        script: |
          cd app
          npm ci

      - name: Build web assets
        script: |
          cd app
          CAPACITOR_BUILD=1 npm run build

      - name: Sync Capacitor iOS (copy web assets only)
        script: |
          cd app
          # app/ios/ é versionado. `cap sync` só copia dist/ pra
          # ios/App/public. Nada de regenerar projeto.
          npx cap sync ios

      - name: Fetch signing files automatically
        script: |
          # Unset env vars residuais do setup manual antigo que podem estar
          # no group `yaya_ios` (CM_CERTIFICATE etc). Se a CLI detectar uma
          # CERTIFICATE_PRIVATE_KEY setada mas inválida, ela tenta usá-la
          # e falha com "Provided value '********' is not valid".
          unset CERTIFICATE_PRIVATE_KEY
          unset CERTIFICATE_PRIVATE_KEY_PASSWORD
          unset CM_CERTIFICATE
          unset CM_CERTIFICATE_PASSWORD
          unset CM_PROVISIONING_PROFILE

          # Inicializa keychain
          keychain initialize

          # Gera uma RSA private key fresca e inline como string (a flag
          # --certificate-key-path não existe nesta versão da CLI; usar
          # --certificate-key com o conteúdo).
          CERT_KEY_CONTENT=$(openssl genrsa 2048)

          # fetch-signing-files cria cert + profile via ASC API (--create)
          # e baixa pra keychain local.
          app-store-connect fetch-signing-files "app.yayababy" \
            --type IOS_APP_STORE \
            --certificate-key "$CERT_KEY_CONTENT" \
            --create

          # Adiciona os certs baixados na keychain default.
          keychain add-certificates

      - name: Set app icon
        script: |
          cp app/assets/app-icon-1024.png app/ios/App/App/Assets.xcassets/AppIcon.appiconset/AppIcon-512@2x.png

      - name: Set version and build number
        script: |
          PBXPROJ="app/ios/App/App.xcodeproj/project.pbxproj"
          sed -i '' 's/MARKETING_VERSION = [^;]*;/MARKETING_VERSION = 1.7.3;/g' "$PBXPROJ"
          sed -i '' 's/CURRENT_PROJECT_VERSION = [^;]*;/CURRENT_PROJECT_VERSION = 38;/g' "$PBXPROJ"

      - name: Use fetched profiles
        script: |
          # Diz pro xcode-project usar os profiles baixados. Esse comando
          # modifica o pbxproj pra apontar pros profile UUIDs baixados e
          # configura signing automaticamente pro target certo.
          xcode-project use-profiles

      - name: Build iOS
        script: |
          cd app/ios/App

          # ExportOptions.plist — automatic signing
          printf '<?xml version="1.0" encoding="UTF-8"?>\n<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">\n<plist version="1.0">\n<dict>\n\t<key>method</key>\n\t<string>app-store</string>\n\t<key>teamID</key>\n\t<string>8TC26XK3WP</string>\n\t<key>signingStyle</key>\n\t<string>automatic</string>\n</dict>\n</plist>\n' > /tmp/ExportOptions.plist
          plutil -lint /tmp/ExportOptions.plist

          # Archive — sem overrides de signing, Xcode usa tudo do pbxproj
          # e dos profiles que xcode-project use-profiles configurou.
          xcodebuild archive \
            -project "App.xcodeproj" \
            -scheme "App" \
            -destination "generic/platform=iOS" \
            -archivePath "$CM_BUILD_DIR/App.xcarchive" \
            COMPILER_INDEX_STORE_ENABLE=NO

          # Export IPA
          xcodebuild -exportArchive \
            -archivePath "$CM_BUILD_DIR/App.xcarchive" \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -exportPath "$CM_BUILD_DIR/ipa"
    artifacts:
      - $CM_BUILD_DIR/ipa/*.ipa
      - $CM_BUILD_DIR/*.xcarchive
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
