workflows:
  ios-testflight:
    name: iOS TestFlight
    max_build_duration: 30
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: codemagic
    environment:
      node: 20
      xcode: latest
      ios_signing:
        distribution_type: app_store
        bundle_identifier: app.yayababy
    scripts:
      - name: Install dependencies
        script: |
          cd app
          npm ci
      - name: Build web assets
        script: |
          cd app
          npm run build
      - name: Sync Capacitor iOS
        script: |
          cd app
          npx cap sync ios
      - name: Install CocoaPods / SPM dependencies
        script: |
          cd app/ios/App
          pod install || true
      - name: Set up code signing
        script: |
          xcode-project use-profiles
      - name: Build iOS
        script: |
          cd app/ios/App
          xcode-project build-ipa \
            --workspace "App.xcworkspace" \
            --scheme "App" \
            --archive-flags="-destination 'generic/platform=iOS'"
    artifacts:
      - app/ios/App/build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Testadores
