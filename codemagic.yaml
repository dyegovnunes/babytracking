workflows:
  ios-testflight:
    name: iOS TestFlight
    max_build_duration: 30
    instance_type: mac_mini_m2
    # Automatic code signing gerenciado pelo Codemagic via ASC API.
    # A integration "codemagic" (Teams → Integrations → App Store Connect)
    # deve ter uma API key válida com permissões de signing.
    integrations:
      app_store_connect: codemagic
    environment:
      groups:
        - yaya_ios
      node: 22
      xcode: latest
    scripts:
      - name: Install dependencies
        script: |
          cd app
          npm ci

      - name: Build web assets
        script: |
          cd app
          CAPACITOR_BUILD=1 npm run build

      - name: Sync Capacitor iOS (copy web assets only)
        script: |
          cd app
          # app/ios/ é versionado. `cap sync` só copia dist/ pra
          # ios/App/public. Nada de regenerar projeto.
          npx cap sync ios

      - name: Fetch signing files (reusa cert existente, nunca revoga no caminho feliz)
        script: |
          # Unset env vars residuais de setup antigo (NÃO remover
          # CERTIFICATE_PRIVATE_KEY — é exatamente ela que agora queremos
          # usar, persistida como secret do group `yaya_ios`).
          unset CERTIFICATE_PRIVATE_KEY_PASSWORD
          unset CM_CERTIFICATE
          unset CM_CERTIFICATE_PASSWORD
          unset CM_PROVISIONING_PROFILE

          keychain initialize

          # ---------------------------------------------------------------
          # Code signing v2 — key RSA persistida + reuso de cert
          # ---------------------------------------------------------------
          # Histórico: antes, a RSA key era gerada in-memory a cada build
          # e descartada. Cert criado ficava órfão (sem key pra parear),
          # forçando REVOGAR + recriar a cada build. Isso invalidava
          # TestFlight anterior e disparava e-mail da Apple "null null
          # has revoked your certificate" toda vez.
          #
          # Agora: `CERTIFICATE_PRIVATE_KEY` é um secret env var do group
          # `yaya_ios`. A key persiste entre builds, o cert paired com ela
          # vira reutilizável, e o fluxo abaixo:
          #   1. Tenta fetch do cert JÁ pareado com nossa key (sem --create)
          #   2. Se achou → reusa. Zero side effect na Apple Developer.
          #   3. Se NÃO achou → revoga certs DISTRIBUTION existentes (são
          #      inúteis — feitos com keys descartadas) e cria UM novo
          #      com a nossa key. Isso só acontece na 1ª build depois
          #      dessa mudança, ou se alguém revogar fora daqui.
          # ---------------------------------------------------------------

          if app-store-connect fetch-signing-files "app.yayababy" \
              --type IOS_APP_STORE \
              --certificate-key "$CERTIFICATE_PRIVATE_KEY" 2>/dev/null; then
            echo "✅ Cert pareado com a key persistida encontrado — reusando."
          else
            echo "⚠️  Nenhum cert pareado — limpando certs órfãos e criando novo..."

            DIST_IDS_LEGACY=$(app-store-connect certificates list --type IOS_DISTRIBUTION --json 2>/dev/null | python3 -c "import sys,json; data=json.load(sys.stdin); print(' '.join(c['id'] for c in data))" 2>/dev/null || echo "")
            DIST_IDS_MODERN=$(app-store-connect certificates list --type DISTRIBUTION --json 2>/dev/null | python3 -c "import sys,json; data=json.load(sys.stdin); print(' '.join(c['id'] for c in data))" 2>/dev/null || echo "")
            DIST_IDS="$DIST_IDS_LEGACY $DIST_IDS_MODERN"

            if [ -n "$(echo $DIST_IDS | tr -d ' ')" ]; then
              echo "Revogando certs antigos (órfãos): $DIST_IDS"
              for id in $DIST_IDS; do
                app-store-connect certificates delete "$id" \
                  --ignore-not-found || true
              done
            fi

            # Cria cert pareado com nossa key persistida. Próxima build
            # vai achar esse cert no primeiro fetch e pular esse else.
            app-store-connect fetch-signing-files "app.yayababy" \
              --type IOS_APP_STORE \
              --certificate-key "$CERTIFICATE_PRIVATE_KEY" \
              --create
          fi

          keychain add-certificates

      - name: Set app icon
        script: |
          cp app/assets/app-icon-1024.png app/ios/App/App/Assets.xcassets/AppIcon.appiconset/AppIcon-512@2x.png

      - name: Set version and build number
        script: |
          # Mantém em sync com app/package.json e app/android/app/build.gradle.
          # Bump aqui sempre que subir versão.
          PBXPROJ="app/ios/App/App.xcodeproj/project.pbxproj"
          sed -i '' 's/MARKETING_VERSION = [^;]*;/MARKETING_VERSION = 1.9.3;/g' "$PBXPROJ"
          sed -i '' 's/CURRENT_PROJECT_VERSION = [^;]*;/CURRENT_PROJECT_VERSION = 61;/g' "$PBXPROJ"

      - name: Use fetched profiles
        script: |
          # Diz pro xcode-project usar os profiles baixados. Esse comando
          # modifica o pbxproj pra apontar pros profile UUIDs baixados e
          # configura signing automaticamente pro target certo.
          xcode-project use-profiles

      - name: Build iOS
        script: |
          # xcode-project build-ipa é o utilitário oficial do Codemagic
          # que faz archive + export num único comando, usando os profiles
          # que xcode-project use-profiles baixou pra keychain. Evita o
          # problema do -exportArchive com signingStyle=automatic não
          # encontrar profiles no momento do export.
          cd app/ios/App
          xcode-project build-ipa \
            --project "App.xcodeproj" \
            --scheme "App" \
            --archive-directory "$CM_BUILD_DIR" \
            --ipa-directory "$CM_BUILD_DIR/ipa"
    artifacts:
      - $CM_BUILD_DIR/ipa/*.ipa
      - $CM_BUILD_DIR/*.xcarchive
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
