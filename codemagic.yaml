workflows:
  ios-testflight:
    name: iOS TestFlight
    max_build_duration: 30
    instance_type: mac_mini_m2
    # Automatic code signing gerenciado pelo Codemagic via ASC API.
    # A integration "codemagic" (Teams → Integrations → App Store Connect)
    # deve ter uma API key válida com permissões de signing.
    integrations:
      app_store_connect: codemagic
    environment:
      groups:
        - yaya_ios
      node: 22
      xcode: latest
    scripts:
      - name: Install dependencies
        script: |
          cd app
          npm ci

      - name: Build web assets
        script: |
          cd app
          CAPACITOR_BUILD=1 npm run build

      - name: Sync Capacitor iOS (copy web assets only)
        script: |
          cd app
          # app/ios/ é versionado. `cap sync` só copia dist/ pra
          # ios/App/public. Nada de regenerar projeto.
          npx cap sync ios

      - name: Fetch signing files automatically
        script: |
          # Unset env vars residuais do setup manual antigo que podem estar
          # no group `yaya_ios` (CM_CERTIFICATE etc). Se a CLI detectar uma
          # CERTIFICATE_PRIVATE_KEY setada mas inválida, ela tenta usá-la
          # e falha com "Provided value '********' is not valid".
          unset CERTIFICATE_PRIVATE_KEY
          unset CERTIFICATE_PRIVATE_KEY_PASSWORD
          unset CM_CERTIFICATE
          unset CM_CERTIFICATE_PASSWORD
          unset CM_PROVISIONING_PROFILE

          # Inicializa keychain
          keychain initialize

          # IMPORTANTE: geramos uma RSA key nova a cada build (não temos a
          # key persistida em env var). Isso significa que certs DISTRIBUTION
          # já existentes na ASC são inúteis (não temos a private key pra
          # casar). Pior: na segunda build em diante a Apple retorna 409 no
          # --create porque já existe um Distribution cert ativo.
          #
          # Solução: revogar todos os certs DISTRIBUTION existentes antes
          # de criar um novo. Seguro porque esse projeto só roda daqui —
          # se outro sistema depender do mesmo cert, precisa persistir a
          # key em CERTIFICATE_PRIVATE_KEY env var e remover este cleanup.
          echo "Limpando certs DISTRIBUTION existentes na ASC..."
          DIST_IDS=$(app-store-connect certificates list --type IOS_DISTRIBUTION --json 2>/dev/null | python3 -c "import sys,json; data=json.load(sys.stdin); print(' '.join(c['id'] for c in data))" 2>/dev/null || echo "")

          if [ -n "$DIST_IDS" ]; then
            echo "Revogando: $DIST_IDS"
            for id in $DIST_IDS; do
              app-store-connect certificates delete "$id" \
                --ignore-not-found || true
            done
          else
            echo "Nenhum cert DISTRIBUTION pra revogar."
          fi

          # Gera uma RSA private key fresca e inline como string (a flag
          # --certificate-key-path não existe nesta versão da CLI; usar
          # --certificate-key com o conteúdo).
          CERT_KEY_CONTENT=$(openssl genrsa 2048)

          # fetch-signing-files cria cert + profile via ASC API (--create)
          # e baixa pra keychain local.
          app-store-connect fetch-signing-files "app.yayababy" \
            --type IOS_APP_STORE \
            --certificate-key "$CERT_KEY_CONTENT" \
            --create

          # Adiciona os certs baixados na keychain default.
          keychain add-certificates

      - name: Set app icon
        script: |
          cp app/assets/app-icon-1024.png app/ios/App/App/Assets.xcassets/AppIcon.appiconset/AppIcon-512@2x.png

      - name: Set version and build number
        script: |
          PBXPROJ="app/ios/App/App.xcodeproj/project.pbxproj"
          sed -i '' 's/MARKETING_VERSION = [^;]*;/MARKETING_VERSION = 1.7.3;/g' "$PBXPROJ"
          sed -i '' 's/CURRENT_PROJECT_VERSION = [^;]*;/CURRENT_PROJECT_VERSION = 38;/g' "$PBXPROJ"

      - name: Use fetched profiles
        script: |
          # Diz pro xcode-project usar os profiles baixados. Esse comando
          # modifica o pbxproj pra apontar pros profile UUIDs baixados e
          # configura signing automaticamente pro target certo.
          xcode-project use-profiles

      - name: Build iOS
        script: |
          # xcode-project build-ipa é o utilitário oficial do Codemagic
          # que faz archive + export num único comando, usando os profiles
          # que xcode-project use-profiles baixou pra keychain. Evita o
          # problema do -exportArchive com signingStyle=automatic não
          # encontrar profiles no momento do export.
          cd app/ios/App
          xcode-project build-ipa \
            --project "App.xcodeproj" \
            --scheme "App" \
            --archive-directory "$CM_BUILD_DIR" \
            --ipa-directory "$CM_BUILD_DIR/ipa"
    artifacts:
      - $CM_BUILD_DIR/ipa/*.ipa
      - $CM_BUILD_DIR/*.xcarchive
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
